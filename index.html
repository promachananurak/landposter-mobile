<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LandPoster Mobile</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#e9e9e4;color:#14231a}
.app{padding:12px;max-width:720px;margin:auto}.card{background:white;border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 4px 18px #0001}
h1{font-size:24px;margin:4px 0} h2{font-size:17px;margin:0 0 10px}.small{color:#667067;font-size:13px}
label{display:block;margin:10px 0;font-size:13px;color:#445047}input{width:100%;padding:11px;border:1px solid #ccd1c8;border-radius:12px;font-size:16px;background:#fff}
.file input{padding:8px}.thumb{width:100%;height:92px;object-fit:cover;border-radius:12px;margin-top:8px;background:#ddd}
button{width:100%;border:0;border-radius:16px;padding:15px;font-size:18px;font-weight:800;background:#123d29;color:#fff;margin:8px 0}
.previewScroll{overflow:auto;background:#dfe2dc;border-radius:18px;padding:10px}
.poster{width:1080px;height:1350px;background:#fff;transform-origin:top left;box-shadow:0 8px 28px #0002}
.header{height:180px;background:#123d29;color:white;display:flex;justify-content:space-between;align-items:center;padding:42px 50px}
.header h1{font-size:58px;line-height:1.05;margin:0}.header p{font-size:28px;margin:10px 0 0;opacity:.9}
.price{background:#e6c36a;color:#102719;border-radius:24px;padding:22px 30px;text-align:right;min-width:310px}.price b{font-size:44px;display:block}.price span{font-size:28px}
.img{background:#d8ddd5;display:grid;place-items:center;overflow:hidden;color:#526056;font-weight:800}.img img{width:100%;height:100%;object-fit:cover}
.hero{height:530px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;padding:28px 38px 38px}
.grid h2{font-size:38px;color:#123d29;margin:0 0 18px}ul{margin:0 0 24px;padding:0;list-style:none}
li{font-size:29px;margin:12px 0;padding:16px 20px;background:#f1f3ee;border-left:10px solid #e6c36a;border-radius:12px}
.street{height:255px;border-radius:22px}.map{height:360px;border-radius:22px}
.contact{height:200px;margin-top:24px;border-radius:22px;background:#123d29;color:white;display:grid;grid-template-columns:170px 1fr;gap:22px;padding:22px;align-items:center}
.qr{width:170px;height:156px;border-radius:14px;background:white;color:#123d29}.contact strong{font-size:28px}.contact p{font-size:28px;margin:10px 0}
#canvas{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>LandPoster Mobile</h1>
    <div class="small">เปิดในมือถือได้เลย ใช้รูปจริงจากเครื่อง ไม่ใช้ AI วาดภาพ</div>
  </div>

  <div class="card">
    <h2>1. ใส่รูป</h2>
    <label class="file">ภาพหลัก / โดรน <input id="heroFile" type="file" accept="image/*"><img id="heroThumb" class="thumb"></label>
    <label class="file">ภาพทำเล / Google Earth <input id="mapFile" type="file" accept="image/*"><img id="mapThumb" class="thumb"></label>
    <label class="file">ภาพหน้าที่ดิน <input id="streetFile" type="file" accept="image/*"><img id="streetThumb" class="thumb"></label>
    <label class="file">QR Code <input id="qrFile" type="file" accept="image/*"><img id="qrThumb" class="thumb"></label>
  </div>

  <div class="card">
    <h2>2. ใส่ข้อมูล</h2>
    <label>หัวข้อ <input id="title" value="ขายที่ดินลานสกา"></label>
    <label>พื้นที่ <input id="size" value="162.7 ตร.ว."></label>
    <label>ราคา <input id="price" value="1.2 ล้านบาท"></label>
    <label>ทำเล <input id="location" value="ต.ขุนทะเล อ.ลานสกา จ.นครศรีธรรมราช"></label>
    <label>จุดเด่น 1 <input id="h1" value="ติดถนน / เดินทางสะดวก"></label>
    <label>จุดเด่น 2 <input id="h2" value="ใกล้ สภ.อ.ลานสกา"></label>
    <label>จุดเด่น 3 <input id="h3" value="เหมาะสร้างบ้าน / ทำการค้า"></label>
    <label>จุดเด่น 4 <input id="h4" value="ไฟฟ้า ประปา ถนนพร้อม"></label>
    <label>โทร <input id="phone" value="0641873579"></label>
    <label>LINE <input id="line" value="manamanamana30"></label>
    <button id="downloadBtn">Export JPG</button>
  </div>

  <div class="card">
    <h2>Preview</h2>
    <div class="previewScroll">
      <div id="poster" class="poster">
        <div class="header">
          <div><h1 data-bind="title"></h1><p data-bind="location"></p></div>
          <div class="price"><b data-bind="price"></b><span data-bind="size"></span></div>
        </div>
        <div class="img hero" id="heroBox">ภาพหลัก / โดรน</div>
        <div class="grid">
          <div>
            <h2>จุดเด่นแปลงนี้</h2>
            <ul><li data-bind="h1"></li><li data-bind="h2"></li><li data-bind="h3"></li><li data-bind="h4"></li></ul>
            <div class="img street" id="streetBox">ภาพหน้าที่ดิน</div>
          </div>
          <div>
            <div class="img map" id="mapBox">ภาพทำเล / Google Earth</div>
            <div class="contact">
              <div class="img qr" id="qrBox">QR</div>
              <div><strong>ติดต่อเจ้าของขายเอง</strong><p>โทร <span data-bind="phone"></span></p><p>LINE: <span data-bind="line"></span></p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<canvas id="canvas" width="1080" height="1350"></canvas>

<script>
const ids=["title","size","price","location","h1","h2","h3","h4","phone","line"];
const imgs={hero:null,map:null,street:null,qr:null};
function bind(){ids.forEach(id=>document.querySelectorAll(`[data-bind="${id}"]`).forEach(el=>el.textContent=document.getElementById(id).value));}
ids.forEach(id=>document.getElementById(id).addEventListener("input",bind)); bind();

function readFile(key, file){
  if(!file)return;
  const url=URL.createObjectURL(file); imgs[key]=url;
  document.getElementById(key+"Thumb").src=url;
  const box=document.getElementById(key+"Box"); box.innerHTML=""; const im=new Image(); im.src=url; box.appendChild(im);
}
["hero","map","street","qr"].forEach(k=>document.getElementById(k+"File").addEventListener("change",e=>readFile(k,e.target.files[0])));

function coverDraw(ctx,img,x,y,w,h){
  const r=Math.max(w/img.width,h/img.height), nw=img.width*r, nh=img.height*r;
  ctx.drawImage(img,x+(w-nw)/2,y+(h-nh)/2,nw,nh);
}
function loadImage(src){return new Promise((res,rej)=>{const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=src;});}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function text(ctx,t,x,y,size,color="#14231a",weight="700"){ctx.fillStyle=color;ctx.font=`${weight} ${size}px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif`;ctx.fillText(t,x,y);}
async function exportJPG(){
  const c=document.getElementById("canvas"),ctx=c.getContext("2d"); ctx.fillStyle="#fff";ctx.fillRect(0,0,1080,1350);
  ctx.fillStyle="#123d29";ctx.fillRect(0,0,1080,180);
  text(ctx,title.value,50,72,58,"#fff","800"); text(ctx,location.value,50,125,28,"#fff","500");
  ctx.fillStyle="#e6c36a";roundRect(ctx,730,42,300,100,24);ctx.fill(); text(ctx,price.value,760,88,40,"#102719","900"); text(ctx,size.value,800,130,28,"#102719","700");
  if(imgs.hero)coverDraw(ctx,await loadImage(imgs.hero),0,180,1080,530); else {ctx.fillStyle="#d8ddd5";ctx.fillRect(0,180,1080,530); text(ctx,"ภาพหลัก / โดรน",420,450,34,"#526056","800")}
  text(ctx,"จุดเด่นแปลงนี้",38,782,38,"#123d29","900");
  const hs=[h1.value,h2.value,h3.value,h4.value]; let y=815; hs.forEach(v=>{ctx.fillStyle="#f1f3ee";roundRect(ctx,38,y,560,62,12);ctx.fill();ctx.fillStyle="#e6c36a";ctx.fillRect(38,y,10,62);text(ctx,v,68,y+41,29,"#14231a","700");y+=78;});
  if(imgs.street)coverDraw(ctx,await loadImage(imgs.street),38,1122,560,190); else {ctx.fillStyle="#d8ddd5";roundRect(ctx,38,1122,560,190,22);ctx.fill();text(ctx,"ภาพหน้าที่ดิน",235,1228,28,"#526056","800")}
  if(imgs.map)coverDraw(ctx,await loadImage(imgs.map),622,738,420,360); else {ctx.fillStyle="#d8ddd5";roundRect(ctx,622,738,420,360,22);ctx.fill();text(ctx,"ภาพทำเล / Google Earth",660,930,26,"#526056","800")}
  ctx.fillStyle="#123d29";roundRect(ctx,622,1122,420,190,22);ctx.fill();
  ctx.fillStyle="#fff";roundRect(ctx,644,1144,150,146,14);ctx.fill();
  if(imgs.qr)coverDraw(ctx,await loadImage(imgs.qr),644,1144,150,146); else text(ctx,"QR",700,1225,28,"#123d29","900");
  text(ctx,"ติดต่อเจ้าของขายเอง",815,1168,25,"#fff","800"); text(ctx,"โทร "+phone.value,815,1215,24,"#fff","700"); text(ctx,"LINE: "+line.value,815,1260,24,"#fff","700");
  const a=document.createElement("a"); a.download="landposter-mobile.jpg"; a.href=c.toDataURL("image/jpeg",0.92); a.click();
}
downloadBtn.addEventListener("click",exportJPG);

function fitPreview(){document.querySelector(".poster").style.transform=`scale(${(document.querySelector(".previewScroll").clientWidth-20)/1080})`;document.querySelector(".previewScroll").style.height=(1350*((document.querySelector(".previewScroll").clientWidth-20)/1080)+30)+"px";}
window.addEventListener("resize",fitPreview); setTimeout(fitPreview,50);
</script>
</body>
</html>
